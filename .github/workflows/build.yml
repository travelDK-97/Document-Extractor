name: Build EXE

on:
  push:
    tags:
      - 'v*' # 当你推送以 v 开头的标签（如 v1.0, v1.1）时触发打包

jobs:
  build:
    runs-on: windows-latest  # 使用 Windows 云端环境

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        # ⚠️ 关键步骤：云端环境是一张白纸，必须在这里安装你的依赖库！
        # 如果你的项目根目录有 requirements.txt，请务必保留下面这行：
        pip install -r requirements.txt 
        # 如果你没有 requirements.txt，你需要把上面那行删掉，并在这里手动写上你的库，例如：
        # pip install rapidocr_onnxruntime pdfplumber 

    - name: Build with PyInstaller
      # 🚀 核心修复：
      # 1. 使用 --collect-all 自动抓取 rapidocr_onnxruntime 的所有模型文件
      # 2. 指定输出名称为 DocumentExtractor
      # 3. 指定入口文件为 app_gui.py
      run: pyinstaller --onefile --windowed --name DocumentExtractor --collect-all rapidocr_onnxruntime app_gui.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DocumentExtractor-Windows-EXE
        path: dist/*.exe