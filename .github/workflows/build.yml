name: Build EXE

on:
  push:
    tags:
      - 'v*' # 当你推送以 v 开头的标签（如 v1.0）时触发打包

jobs:
  build:
    runs-on: windows-latest  # 在 Windows 环境下运行

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        # 如果你有 requirements.txt，取消下面一行的注释
        # pip install -r requirements.txt 
        # 如果没有文件，直接在这里 pip install 你用到的库（如 pip install requests）

    - name: Build with PyInstaller
      run: pyinstaller --onefile --windowed main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-gui-app
        path: dist/*.exe